<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Corporate Finance Dashboard</title>

<link rel="icon" type="image/svg+xml"
href="data:image/svg+xml,
%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E
%3Crect width='100' height='100' rx='20' fill='%231f4e9a'/%3E
%3Ctext x='50' y='62' font-size='55' text-anchor='middle' fill='white'%3E📊%3C/text%3E
%3C/svg%3E">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:#dcdcdc;
}

/* Top Navigation */
.top-nav{
    width:95%;
    margin:40px auto 10px auto;
}
.top-nav a{
    text-decoration:none;
    background:#25ae10;
    color:white;
    padding:10px 15px;
    border-radius:8px;
    font-size:14px;
    transition:0.3s;
}
.top-nav a:hover{
    background:#163c74;
}

/* Filters */
.filters{
    width:95%;
    margin:20px auto;
    display:flex;
    gap:15px;
}
select{
    padding:8px;
    border-radius:5px;
    border:none;
}

/* Dashboard Grid */
.dashboard{
    width:95%;
    margin:30px auto;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    grid-gap:30px;
}

/* Cards */
.card{
    padding:20px;
    border-radius:10px;
    color:white;
    box-shadow:0 10px 20px rgba(0,0,0,0.4);
}
.card1{ background:linear-gradient(135deg,#7b2ff7,#f107a3);}
.card2{ background:linear-gradient(135deg,#11998e,#38ef7d);}
.card3{ background:linear-gradient(135deg,#000000,#434343);}
.card4{ background:linear-gradient(135deg,#1e3c72,#2a5298);}

.card h3{
    text-align:center;
    margin-bottom:15px;
}
canvas{
    background:transparent;
}
</style>
</head>

<body>

<div class="top-nav">
    <a href="index.html">← Back to Home</a>
</div>

<div class="filters">
    <select id="yearFilter">
        <option value="All">All Years</option>
    </select>

    <select id="typeFilter">
        <option value="All">All Type</option>
        <option value="Income">Income</option>
        <option value="Expense">Expense</option>
    </select>
</div>

<div class="dashboard">

<div class="card card1">
    <h3>Income vs Expense</h3>
    <canvas id="donutChart"></canvas>
</div>

<div class="card card2">
    <h3>Yearly Summary</h3>
    <canvas id="pieChart"></canvas>
</div>

<div class="card card3">
    <h3>Income by Category</h3>
    <canvas id="incomeBar"></canvas>
</div>

<div class="card card4">
    <h3>Expense by Category</h3>
    <canvas id="expenseBar"></canvas>
</div>

</div>

<script>

let data = [];

/* CONNECT TO GOOGLE SHEET */
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vTC9oVh_keSpL8JCy71_9-OFdQ2E1EGa2YPKy7o915PUJF9Lakgcl6z66y21bXgdG7pIC840VDE2VI4/pub?output=csv")
.then(response => response.text())
.then(csv => {

    const rows = csv.trim().split("\n").slice(1);

    rows.forEach(row => {

        // Robust CSV parser
        const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
        if(!cols || cols.length < 6) return;

        const date = cols[1].replace(/"/g,'').trim();
        const category = cols[3].replace(/"/g,'').trim();
        const amountRaw = cols[4].replace(/"/g,'').trim();
        const type = cols[5].replace(/"/g,'').trim();

        const cleanAmount = parseFloat(amountRaw.replace(/[^0-9.-]+/g,""));

        if(!isNaN(cleanAmount)){
            data.push({
                date: date,
                category: category,
                amount: cleanAmount,
                type: type
            });
        }

    });

    initializeDashboard();
})
.catch(error => console.error("Google Sheet Fetch Error:", error));


/* Charts */
let donutChart = new Chart(document.getElementById('donutChart'),{
    type:'doughnut',
    data:{labels:["Income","Expense"],datasets:[{data:[0,0]}]},
    options:{plugins:{legend:{labels:{color:"white"}}}}
});

let pieChart = new Chart(document.getElementById('pieChart'),{
    type:'pie',
    data:{labels:["Income","Expense","Net Balance"],datasets:[{data:[0,0,0]}]},
    options:{plugins:{legend:{labels:{color:"white"}}}}
});

let incomeBar = new Chart(document.getElementById('incomeBar'),{
    type:'bar',
    data:{labels:[],datasets:[{label:"Income",data:[]}]},
    options:{
        plugins:{legend:{labels:{color:"white"}}},
        scales:{x:{ticks:{color:"white"}},y:{ticks:{color:"white"}}}
    }
});

let expenseBar = new Chart(document.getElementById('expenseBar'),{
    type:'bar',
    data:{labels:[],datasets:[{label:"Expense",data:[]}]},
    options:{
        plugins:{legend:{labels:{color:"white"}}},
        scales:{x:{ticks:{color:"white"}},y:{ticks:{color:"white"}}}
    }
});


function initializeDashboard(){

    let yearSet = new Set();

    data.forEach(d=>{
        const parts = d.date.split("/");
        if(parts.length === 3){
            yearSet.add(parts[2]);
        }
    });

    const yearFilter = document.getElementById("yearFilter");
    yearFilter.innerHTML = '<option value="All">All Years</option>';

    yearSet.forEach(y=>{
        yearFilter.innerHTML += `<option value="${y}">${y}</option>`;
    });

    updateDashboard();
}


function updateDashboard(){

    const year = document.getElementById("yearFilter").value;
    const type = document.getElementById("typeFilter").value;

    const filtered = data.filter(d=>{
        const recordYear = d.date.split("/")[2];
        const yearMatch = (year==="All" || recordYear===year);
        const typeMatch = (type==="All" || d.type===type);
        return yearMatch && typeMatch;
    });

    let totalIncome = 0;
    let totalExpense = 0;
    let incomeCategories = {};
    let expenseCategories = {};

    filtered.forEach(d=>{
        if(d.type==="Income"){
            totalIncome += d.amount;
            incomeCategories[d.category] =
                (incomeCategories[d.category] || 0) + d.amount;
        }
        if(d.type==="Expense"){
            totalExpense += d.amount;
            expenseCategories[d.category] =
                (expenseCategories[d.category] || 0) + d.amount;
        }
    });

    const net = totalIncome - totalExpense;

    donutChart.data.datasets[0].data=[totalIncome,totalExpense];
    donutChart.update();

    pieChart.data.datasets[0].data=[totalIncome,totalExpense,net];
    pieChart.update();

    incomeBar.data.labels=Object.keys(incomeCategories);
    incomeBar.data.datasets[0].data=Object.values(incomeCategories);
    incomeBar.update();

    expenseBar.data.labels=Object.keys(expenseCategories);
    expenseBar.data.datasets[0].data=Object.values(expenseCategories);
    expenseBar.update();
}


document.getElementById("yearFilter").addEventListener("change",updateDashboard);
document.getElementById("typeFilter").addEventListener("change",updateDashboard);

</script>

</body>
</html>
