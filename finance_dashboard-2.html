<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Corporate Finance Dashboard</title>

<link rel="icon" type="image/svg+xml" 
href="data:image/svg+xml,
%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E
%3Crect width='100' height='100' rx='20' fill='%231f4e9a'/%3E
%3Ctext x='50' y='62' font-size='55' text-anchor='middle' fill='white' font-family='Arial'%3E📊%3C/text%3E
%3C/svg%3E">

<script src="https://cdn.jsdelivr.net/npm/chart.js">
</script>

<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:#c8dbee;
}

/* Filters */
.filters{
    width:95%;
    margin:25px auto;
    display:flex;
    gap:15px;
}

select{
    padding:8px 12px;
    border-radius:6px;
    border:1px solid #2c3e50;
    background:white;
    font-weight:600;
}

/* Dashboard Grid */
.dashboard{
    width:95%;
    margin:20px auto 40px auto;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:30px;
}

/* Cards */
.card{
    background:#a9c4df;
    border-radius:30px;
    padding:25px;
    border:2px solid #2c3e50;
    box-shadow:0 18px 30px rgba(0,0,0,0.45);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-6px);
}

.card h3{
    text-align:center;
    margin-bottom:15px;
    color:#1f1f1f;
    font-weight:700;
}

/* KPI */
.kpi{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:220px;
}

.kpi h1{
    font-size:60px;
    margin:0;
    color:#1f1f1f;
}

.kpi p{
    font-weight:600;
    color:#1f1f1f;
}

canvas{
    max-height:260px;
}

/*Top Nav_Bar Design */
.top-nav a{
    
    text-decoration:none;
    background:#25ae10;
    color:white;
    padding:10px 15px;
    border-radius:8px;
    font-size:14px;
    transition:0.3s;
}
.top-nav a:hover{
    background:#163c74;
}
.top-nav{
    width:95%;
    margin:18px;  /* increased top space */
}



</style>

<!--Home Button-->
<div class="top-nav">
    <a href="index.html">← Back to Home</a>
</div>


<body>
<div class="filters">
    <select id="yearFilter">
        <option value="All">All Years</option>
    </select>

    <select id="typeFilter">
        <option value="All">All Types</option>
        <option value="Income">Income</option>
        <option value="Expense">Expense</option>
    </select>
</div>

<div class="dashboard">

<div class="card kpi">
    <h1 id="totalAmount">0</h1>
    <p>Net Balance</p>
</div>

<div class="card">
    <h3>Income vs Expense</h3>
    <canvas id="donutChart"></canvas>
</div>

<div class="card">
    <h3>Yearly Summary</h3>
    <canvas id="pieChart"></canvas>
</div>

<div class="card">
    <h3>Income by Category</h3>
    <canvas id="incomeBar"></canvas>
</div>

<div class="card">
    <h3>Monthly Trend</h3>
    <canvas id="lineChart"></canvas>
</div>

<div class="card">
    <h3>Expense by Category</h3>
    <canvas id="expenseBar"></canvas>
</div>

</div>


    
<script>

let data = [];

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vTC9oVh_keSpL8JCy71_9-OFdQ2E1EGa2YPKy7o915PUJF9Lakgcl6z66y21bXgdG7pIC840VDE2VI4/pub?output=csv")
.then(response => response.text())
.then(csv => {

    // Proper CSV parsing
    const rows = csv.trim().split("\n").slice(1);

    rows.forEach(row => {

        // Use regex to handle commas inside currency properly
        const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

        if(!cols || cols.length < 6) return;

        let date = cols[1].replace(/"/g,'').trim();
        let category = cols[3].replace(/"/g,'').trim();
        let amount = cols[4].replace(/"/g,'').trim();
        let type = cols[5].replace(/"/g,'').trim();

        data.push({
            date: date,
            category: category,
            amount: parseFloat(amount.replace(/[^0-9.-]+/g,"")),
            type: type
        });

    });

    initializeDashboard();
})
.catch(err => console.log("Fetch error:", err));

/* Charts */

let donutChart = new Chart(document.getElementById('donutChart'),{
    type:'doughnut',
    data:{labels:["Income","Expense"],datasets:[{data:[0,0]}]},
    options:{plugins:{legend:{labels:{color:"white"}}}}
});

let pieChart = new Chart(document.getElementById('pieChart'),{
    type:'pie',
    data:{labels:["Income","Expense","Net Balance"],datasets:[{data:[0,0,0]}]},
    options:{plugins:{legend:{labels:{color:"white"}}}}
});

let incomeBar = new Chart(document.getElementById('incomeBar'),{
    type:'bar',
    data:{labels:[],datasets:[{label:"Income",data:[]}]},
    options:{
        plugins:{legend:{labels:{color:"white"}}},
        scales:{x:{ticks:{color:"white"}},y:{ticks:{color:"white"}}}
    }
});

let expenseBar = new Chart(document.getElementById('expenseBar'),{
    type:'bar',
    data:{labels:[],datasets:[{label:"Expense",data:[]}]},
    options:{
        plugins:{legend:{labels:{color:"white"}}},
        scales:{x:{ticks:{color:"white"}},y:{ticks:{color:"white"}}}
    }
});

function initializeDashboard(){

    let yearSet = new Set();

    data.forEach(d=>{
        let parts = d.date.split("/");
        if(parts.length === 3){
            yearSet.add(parts[2]);
        }
    });

    let yearFilter = document.getElementById("yearFilter");
    yearFilter.innerHTML = '<option value="All">All Years</option>';

    yearSet.forEach(y=>{
        yearFilter.innerHTML += `<option>${y}</option>`;
    });

    updateDashboard();
}

function updateDashboard(){

    let year = document.getElementById("yearFilter").value;
    let type = document.getElementById("typeFilter").value;

    let filtered = data.filter(d => {

        let parts = d.date.split("/");
        let recordYear = parts[2];

        let yearMatch = (year==="All" || recordYear===year);
        let typeMatch = (type==="All" || d.type===type);

        return yearMatch && typeMatch;
    });

    let totalIncome = 0;
    let totalExpense = 0;
    let incomeCategories = {};
    let expenseCategories = {};

    filtered.forEach(d=>{
        if(d.type==="Income"){
            totalIncome += d.amount;
            incomeCategories[d.category]=(incomeCategories[d.category]||0)+d.amount;
        }
        if(d.type==="Expense"){
            totalExpense += d.amount;
            expenseCategories[d.category]=(expenseCategories[d.category]||0)+d.amount;
        }
    });

    let net = totalIncome - totalExpense;

    donutChart.data.datasets[0].data=[totalIncome,totalExpense];
    donutChart.update();

    pieChart.data.datasets[0].data=[totalIncome,totalExpense,net];
    pieChart.update();

    incomeBar.data.labels=Object.keys(incomeCategories);
    incomeBar.data.datasets[0].data=Object.values(incomeCategories);
    incomeBar.update();

    expenseBar.data.labels=Object.keys(expenseCategories);
    expenseBar.data.datasets[0].data=Object.values(expenseCategories);
    expenseBar.update();
}

document.getElementById("yearFilter").addEventListener("change",updateDashboard);
document.getElementById("typeFilter").addEventListener("change",updateDashboard);

</script>

</body>
</html>
